<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <style>
    body {
            background: linear-gradient(135deg, #79b7d5ff, #165a6fff);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container da calculadora */
        form {
            background: #2c3e50;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 18px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Título */
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ecf0f1;
        }

        /* Labels */
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #ecf0f1;
        }

        /* Inputs */
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 15px;
            outline: none;
            font-size: 16px;
        }
    </style>
</head>
    <body>
    <form>
        <div class="container">
        <h1>Cadastro de Endereço</h1>
        <label for="cep">Digite o CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="Ex: 12345-678"><br>
        <label for="logradouro">Logradouro:</label>
        <input type="text" id="logradouro" name="logradouro"> <br>
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" name="bairro"><br>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade"> <br>
        <label for="estado">Estado:</label>
        <input type="text" id="estado" name="estado">
        </div>
        <div class="jaguatirica">
            <h3>Name:</h3>
            <input type="text" name="name" placeholder="Enter your name"><br>
        </div>
        <div> 
            <input type="button" value="+" id="addname">
        </div>
</form>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
    
     // 1. Selecionar o elemento pelo ID
    $(document).ready(function() {
        $('#cep').val("89165305");

        // esconde o container da calculadora
        $('.container').hide(); 
        $(".container").show();
        
    })
    $('#addname').on('click', function() {
       var newCamp = $('<input type="text" name="name" placeholder="Enter your name"><br>');
    //      o append adiciona o novo campo ao container da calculadora
       $('.jaguatirica').append(newCamp);

       numberOfNames();
    });
    function numberOfNames() {
        var value = 0;
       $('.jaguatirica input[name="name"]').each(function() {
            $(this).val(value);
            value++; 
        });
       }
       $(document).on("click" , "input[name='name']", function() {
            $(this).val("clicked");
               
            var index = $("input[name='name']").index(this);
            alert("O campo clicado é o número: " + index);
       });
    // 2. Adicionar o event listener para o evento 'blur'(executado quando é retirado o mouse)
    campoCep.addEventListener('blur', function() {
        // let valorCep  = campoCep.value; // pegar o valor do campoCep
        // fetch("https://viacep.com.br/ws/"+valorCep+"/json/")
        //     .then(response => response.json())
        //     .then(data => {
        //         console.log(data);
        //         document.getElementById('logradouro').value = data.logradouro || '';
        //         document.getElementById('bairro').value = data.bairro || '';
        //         document.getElementById('cidade').value = data.localidade || '';
        //         document.getElementById('estado').value = data.uf   || '';
        //         mudaBorda(0)
        //     })
        //     .catch(error => mudaBorda(1));

        $.ajax({
            url: "https://viacep.com.br/ws/"+campoCep.value+"/json/",
            method: "GET",
            success: function(data) {
                console.log(data);
                document.getElementById('logradouro').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.localidade || '';
                document.getElementById('estado').value = data.uf   || '';
                mudaBorda(0)
            },
            error: function() {
                mudaBorda(1);
            }
        })});

        function mudaBorda(cor) {
            if(cor == 1){
                campoCep.style.border = "4px solid red";
            }else{
                campoCep.style.border = "4px solid green";
            }
        }


</script>
</body>
